<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0b17">
<title>🌙 Admin — Cartes Eid</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root { --gold:#FFD700; --gold-light:#FFF0A0; --gold-dark:#B8960C; --dark:#0b0b17; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:var(--dark);color:#fff;font-family:'Cormorant Garamond',serif;min-height:100vh;-webkit-font-smoothing:antialiased;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:.2}}

/* ════ ÉCRAN MOT DE PASSE ════ */
#lockScreen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem 1.2rem;text-align:center;gap:1rem;
}
.lk-icon{font-size:3rem;animation:fadeUp .5s ease both;}
.lk-title{
  font-family:'Cinzel Decorative',cursive;font-weight:900;
  font-size:clamp(1.2rem,4vw,1.9rem);
  background:linear-gradient(135deg,#B8960C,#FFD700,#FFF0A0,#FFD700,#B8960C);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:fadeUp .5s .1s ease both;
}
.lk-sub{font-size:.88rem;color:rgba(255,255,255,.38);font-style:italic;animation:fadeUp .5s .2s ease both;}
.lk-box{
  width:100%;max-width:320px;
  background:rgba(255,215,0,.04);
  border:1px solid rgba(255,215,0,.25);border-radius:14px;
  padding:1.5rem 1.3rem;
  animation:fadeUp .6s .3s ease both;
}
.lk-lbl{font-family:'Cinzel Decorative',cursive;font-size:.62rem;letter-spacing:.26em;color:var(--gold);margin-bottom:.8rem;}
#adminPwd{
  width:100%;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,215,0,.28);border-radius:10px;
  padding:.85rem .9rem;font-family:'Cormorant Garamond',serif;
  font-size:max(16px,1.05rem);color:#fff;text-align:center;
  outline:none;transition:border-color .3s,box-shadow .3s;
  caret-color:var(--gold);-webkit-appearance:none;
}
#adminPwd:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(255,215,0,.1);}
.lk-btn{
  width:100%;margin-top:.75rem;
  background:linear-gradient(135deg,#9a7a00,#FFD700,#9a7a00);
  border:none;border-radius:10px;padding:.9rem;
  font-family:'Cinzel Decorative',cursive;font-size:.82rem;
  color:#0b0b17;font-weight:900;letter-spacing:.1em;
  cursor:pointer;min-height:48px;transition:transform .2s;
}
.lk-btn:active{transform:scale(.97);}
.lk-err{color:#ff7070;font-size:.78rem;margin-top:.5rem;min-height:1em;opacity:0;transition:opacity .3s;font-style:italic;}
.lk-err.on{opacity:1;}

/* ════ PAGE ADMIN ════ */
#adminPage{display:none;}
#adminPage.on{display:block;}

.adm-header{
  background:linear-gradient(180deg,#08081a,#0b0b17);
  border-bottom:1px solid rgba(255,215,0,.15);
  padding:1.5rem 1.5rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
  position:sticky;top:0;z-index:10;
}
.adm-title{
  font-family:'Cinzel Decorative',cursive;font-weight:900;
  font-size:clamp(.95rem,2.5vw,1.4rem);
  background:linear-gradient(135deg,#B8960C,#FFD700,#FFF0A0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.adm-sub{font-size:.75rem;color:rgba(255,255,255,.35);font-style:italic;margin-top:.2rem;}
.adm-actions{display:flex;gap:.7rem;align-items:center;flex-wrap:wrap;}
.print-btn{
  background:linear-gradient(135deg,#9a7a00,#FFD700,#9a7a00);
  border:none;border-radius:8px;padding:.65rem 1.4rem;
  font-family:'Cinzel Decorative',cursive;font-size:.72rem;
  color:#0b0b17;font-weight:900;letter-spacing:.08em;
  cursor:pointer;transition:transform .2s;
}
.print-btn:active{transform:scale(.97);}
.lock-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.5);border-radius:8px;padding:.65rem 1.2rem;
  font-family:'Cormorant Garamond',serif;font-size:.85rem;
  cursor:pointer;transition:all .3s;
}
.lock-btn:hover{border-color:rgba(255,215,0,.4);color:var(--gold);}

.adm-body{max-width:820px;margin:0 auto;padding:2rem 1.2rem 5rem;}

/* ════ CARTES ════ */
.cards-grid{display:flex;flex-direction:column;gap:2.8rem;}

.card-print-wrap{display:flex;flex-direction:column;gap:.5rem;}
.card-label{font-size:.7rem;color:rgba(255,215,0,.35);font-style:italic;letter-spacing:.05em;}

.card-row{
  display:flex;align-items:stretch;
  border-radius:12px;overflow:hidden;
  box-shadow:0 6px 32px rgba(0,0,0,.55);
}

/* Face commune */
.card-face{
  flex:1;min-height:230px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:1.5rem 1.1rem;gap:.5rem;text-align:center;
  position:relative;
}

/* Trait de découpe */
.card-cut{
  width:1px;flex-shrink:0;
  background:repeating-linear-gradient(to bottom,rgba(255,215,0,.5) 0,rgba(255,215,0,.5) 7px,transparent 7px,transparent 14px);
  position:relative;
}
.card-cut::before{
  content:'✂';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:.75rem;color:rgba(255,215,0,.5);
  background:#0b0b17;padding:.12rem .08rem;
}

/* FACE GAUCHE — déco */
.card-deco{
  background:linear-gradient(145deg,#0d0d22,#0f0f28 55%,#0b0b17);
}
.card-deco::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(255,215,0,.013) 18px,rgba(255,215,0,.013) 20px);
}
.cd-cn{position:absolute;width:16px;height:16px;border-color:rgba(255,215,0,.55);border-style:solid;}
.cd-cn.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:3px 0 0 0;}
.cd-cn.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;border-radius:0 3px 0 0;}
.cd-cn.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-radius:0 0 0 3px;}
.cd-cn.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 3px 0;}
.cd-moon{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fffde7,#FFD700 38%,#B8960C 68%,#7a6000 100%);box-shadow:0 0 16px rgba(255,215,0,.38);}
.cd-icon{font-size:1.2rem;}
.cd-name{font-family:'Cinzel Decorative',cursive;font-size:.88rem;color:var(--gold);}
.cd-role{font-size:.58rem;color:rgba(255,255,255,.33);font-style:italic;}
.cd-divider{display:flex;align-items:center;gap:.4rem;width:80%;}
.cd-divider span:first-child,.cd-divider span:last-child{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(255,215,0,.3),transparent);}
.cd-divider span:nth-child(2){font-size:.58rem;color:rgba(255,215,0,.45);}
.cd-ar{font-family:'Amiri',serif;direction:rtl;font-size:.82rem;color:rgba(255,215,0,.65);}
.cd-en{font-family:'Cinzel Decorative',cursive;font-size:.46rem;color:rgba(255,215,0,.28);letter-spacing:.13em;}

/* FACE DROITE — QR */
.card-qr{background:#fefcf3;gap:.6rem;}
.cq-title{font-family:'Cinzel Decorative',cursive;font-size:.55rem;letter-spacing:.14em;color:#8a6500;text-transform:uppercase;}
.cq-block{display:flex;flex-direction:column;align-items:center;gap:.25rem;}
.cq-lbl{font-size:.5rem;color:#8a6500;letter-spacing:.1em;text-transform:uppercase;font-family:'Cinzel Decorative',cursive;}
.cq-qr{background:white;padding:4px;border:2px solid #c8a000;border-radius:5px;}
.cq-sep{font-size:.65rem;color:#c8a000;}
.cq-hint{font-size:.43rem;color:#bbb;letter-spacing:.07em;word-break:break-all;max-width:140px;margin-top:.1rem;}

/* ════ IMPRESSION ════ */
@media print {
  body{background:white !important;}
  #lockScreen{display:none !important;}
  .adm-header,.adm-actions{display:none !important;}
  #adminPage{display:block !important;}
  .adm-title,.adm-sub{color:#B8960C !important;-webkit-text-fill-color:#B8960C !important;}
  .cards-grid{gap:1.6rem;}
  .card-print-wrap{break-inside:avoid;page-break-inside:avoid;}
  .card-label{color:#999 !important;}
  .card-deco{background:linear-gradient(145deg,#0d0d22,#0f0f28 55%,#0b0b17) !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .card-qr{background:#fefcf3 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}

@media (max-width:480px){
  .adm-body{padding:1.2rem .8rem 4rem;}
  .card-face{padding:1.1rem .8rem;min-height:190px;}
}
</style>
</head>
<body>

<!-- ══ MOT DE PASSE ══ -->
<div id="lockScreen">
  <div class="lk-icon">🔐</div>
  <h1 class="lk-title">Espace Admin</h1>
  <p class="lk-sub">Réservé à l'organisateur</p>
  <div class="lk-box">
    <p class="lk-lbl">✦ Mot de passe ✦</p>
    <input id="adminPwd" type="password" placeholder="••••••••"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="lk-btn" onclick="checkPwd()">🌙 Accéder</button>
    <p class="lk-err" id="pwdErr">Mot de passe incorrect</p>
  </div>
</div>

<!-- ══ PAGE ADMIN ══ -->
<div id="adminPage">

  <div class="adm-header">
    <div>
      <div class="adm-title">🌙 Cartes Eid — Impression</div>
      <div class="adm-sub">Découpez sur le trait ✂️ · Collez dos à dos sur une carte bristol</div>
    </div>
    <div class="adm-actions">
      <button class="print-btn" onclick="window.print()">🖨 Imprimer tout</button>
      <button class="lock-btn" onclick="logout()">🔒 Verrouiller</button>
    </div>
  </div>

  <div class="adm-body">
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

</div>

<script>
/* ════ MOT DE PASSE ADMIN ════
   Hash djb2 — fonctionne sur tous les navigateurs
   y compris mobile sans HTTPS
════════════════════════════ */
function checkPwd() {
  const val = document.getElementById('adminPwd').value;
  const err = document.getElementById('pwdErr');
  if (val === 'EID-admin_bilal') {
    err.classList.remove('on');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminPage').classList.add('on');
    buildCards();
  } else {
    err.classList.add('on');
    const inp = document.getElementById('adminPwd');
    inp.style.animation = 'none'; void inp.offsetWidth;
    inp.style.animation = 'shake .4s ease';
    inp.value = '';
  }
}

function logout() {
  document.getElementById('adminPage').classList.remove('on');
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('adminPwd').value = '';
}

/* ════ DONNÉES ════ */
const DATA = {
  'EID-PAPA-ALADHA':     { name:'Papa',     role:'أبي الغالي',              icon:'👨', galerie:'famille' },
  'EID-MAMAN-ALADHA':    { name:'Maman',    role:'أمي الحبيبة',             icon:'👩', galerie:'famille' },
  'EID-ZAKARIA-ALADHA':  { name:'Zakaria',  role:'Mon petit frère bien-aimé',icon:'👧', galerie:'famille' },
  'EID-SOUFIANE-ALADHA': { name:'Soufiane', role:'Mon petit frère',          icon:'🧒', galerie:'famille' },
  'EID-HAMZA-ALADHA':    { name:'Hamza',    role:'Mon frère bien-aimé',      icon:'👦', galerie:'photos'  },
  'EID-DODY-ALADHA':     { name:'Dody',     role:'Mon neveu adoré',          icon:'🎈', galerie:'photos'  },
  'EID-ADAM-ALADHA':     { name:'Adam',     role:'Mon petit lion',           icon:'⭐', galerie:'photos'  },
};

/* ════ GÉNÉRATION DES CARTES ════ */
function buildCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  // Base URL : même domaine, pointe vers index.html et galerie.html
  const base    = window.location.origin + window.location.pathname.replace('admin.html', '') + 'index.html';
  const galBase = window.location.origin + window.location.pathname.replace('admin.html', '') + 'galerie.html';

  Object.entries(DATA).forEach(([code, p]) => {
    const msgUrl  = base    + '?code=' + code;
    const galCode = p.galerie === 'famille' ? 'EID-FAMILLE-ALADHA' : 'EID-PHOTOS-ALADHA';
    const galUrl  = galBase + '?code=' + galCode;
    const galLabel = p.galerie === 'famille' ? 'Album famille + enfants' : 'Album photos enfants';

    const wrap = document.createElement('div');
    wrap.className = 'card-print-wrap';
    wrap.innerHTML = `
      <p class="card-label">✂️ ${p.name} — Découpez sur le trait, collez dos à dos</p>
      <div class="card-row">

        <div class="card-face card-deco">
          <div class="cd-cn tl"></div><div class="cd-cn tr"></div>
          <div class="cd-cn bl"></div><div class="cd-cn br"></div>
          <div class="cd-moon"></div>
          <div class="cd-icon">${p.icon}</div>
          <div class="cd-name">${p.name}</div>
          <div class="cd-role">${p.role}</div>
          <div class="cd-divider"><span></span><span>✦</span><span></span></div>
          <div class="cd-ar">عيد مبارك سعيد</div>
          <div class="cd-en">Eid Al-Adha 2025</div>
        </div>

        <div class="card-cut"></div>

        <div class="card-face card-qr">
          <div class="cq-title">🌙 Scannez pour ouvrir</div>
          <div class="cq-block">
            <div class="cq-lbl">Votre message</div>
            <div class="cq-qr" id="qr_msg_${code}"></div>
          </div>
          <div class="cq-sep">✦</div>
          <div class="cq-block">
            <div class="cq-lbl">${galLabel}</div>
            <div class="cq-qr" id="qr_gal_${code}"></div>
          </div>
          <div class="cq-hint">${code}</div>
        </div>

      </div>`;

    grid.appendChild(wrap);

    setTimeout(() => {
      try {
        new QRCode(document.getElementById('qr_msg_' + code), {
          text: msgUrl, width: 120, height: 120,
          colorDark: '#1a0a00', colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M
        });
        new QRCode(document.getElementById('qr_gal_' + code), {
          text: galUrl, width: 120, height: 120,
          colorDark: '#1a0a00', colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch(e) {}
    }, 200);
  });
}
</script>
</body>
</html>
